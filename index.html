// ============ ユーティリティ ============
function pd(s){if(!s)return null;const d=new Date(s);return isNaN(d)?null:d;}
function fmt(s){const d=pd(s);if(!d)return"—";return`${d.getMonth()+1}/${d.getDate()}`;}
function diff(a,b){const da=pd(a),db=typeof b==="string"?pd(b):b;if(!da||!db)return null;return Math.round((db-da)/86400000);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmtNum(v,type){
  if(v===null||v===undefined||v==="")return"—";
  const n=parseFloat(v);if(isNaN(n))return"—";
  if(type==="yen")return"¥"+n.toLocaleString("ja-JP",{maximumFractionDigits:0});
  if(type==="usd")return"💲"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  if(type==="pct")return(n*100).toFixed(1)+"%";
  return n.toLocaleString("ja-JP",{maximumFractionDigits:4});
}
let _toastTimer=null;
function toast(msg,ok=true){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.background=ok?'#2E8B6E':'#C05050';
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

// ============ Supabase API ============
let _session=null;
async function sbFetch(path,opts={}){
  const headers={'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Prefer':'return=representation'};
  if(_session)headers['Authorization']='Bearer '+_session.access_token;
  const res=await fetch(SUPABASE_URL+path,{...opts,headers:{...headers,...(opts.headers||{})}});
  if(!res.ok){const t=await res.text();throw new Error(t);}
  const ct=res.headers.get('content-type')||'';
  return ct.includes('json')?res.json():null;
}

// DBレコード ↔ アプリオブジェクト変換
function dbToOrder(r){
  return{
    _uid:r.uid, id:r.id, name:r.name, client:r.client, assignee:r.assignee,
    qty:r.qty, status:r.status, hidden:r.hidden, memo:r.memo,
    maker:r.maker, category1:r.category1, category2:r.category2,
    planner:r.planner, production:r.production, country:r.country,
    supplier:r.supplier, shipMethod:r.ship_method,
    tasks:r.tasks||{}, schedule:r.schedule||{}, fin:r.fin||{}, images:r.images||[],
  };
}
function orderToDb(o){
  const t={};
  TASK_FIELDS.forEach(f=>t[f.key]=o.tasks[f.key]||"");
  const s={};
  SCHED_FIELDS.forEach(f=>s[f.key]=o.schedule[f.key]||"");
  return{
    id:o.id, name:o.name, client:o.client, assignee:o.assignee,
    qty:o.qty||0, status:o.status, hidden:o.hidden||false, memo:o.memo||'',
    maker:o.maker||'', category1:o.category1||'', category2:o.category2||'',
    planner:o.planner||'', production:o.production||'', country:o.country||'',
    supplier:o.supplier||'', ship_method:o.shipMethod||'',
    tasks:t, schedule:s, fin:o.fin||{}, images:o.images||[],
  };
}

// ============ DB操作 ============
async function loadOrders(){
  setLoading(30);
  try{
    const data=await sbFetch('/rest/v1/orders?select=*&order=created_at.asc');
    orders=(data||[]).map(dbToOrder);
    // 納期過ぎたものを自動完了に
    await autoCompleteOverdue();
    setLoading(100);
    setTimeout(()=>setLoading(0),400);
  }catch(e){toast('読み込みエラー: '+e.message,false);setLoading(0);}
}

async function autoCompleteOverdue(){
  const today=new Date(); today.setHours(0,0,0,0);
  const toUpdate=orders.filter(o=>{
    if(o.status==='完了')return false;
    const d=pd(o.schedule.delivery);
    return d&&d<today;
  });
  for(const o of toUpdate){
    o.status='完了';
    o.hidden=true;
    await saveOrder(o);
  }
  if(toUpdate.length>0)orders=[...orders]; // 再描画トリガー
}
async function saveOrder(o){
  setLoading(50);
  try{
    const body=orderToDb(o);
    let result;
    if(o._uid){
      result=await sbFetch(`/rest/v1/orders?uid=eq.${o._uid}`,{method:'PATCH',body:JSON.stringify(body)});
      orders=orders.map(x=>x._uid===o._uid?dbToOrder({...body,uid:o._uid}):x);
    }else{
      result=await sbFetch('/rest/v1/orders',{method:'POST',body:JSON.stringify(body)});
      if(result&&result[0])orders=[...orders,dbToOrder(result[0])];
    }
    toast('保存しました');
    setLoading(100);setTimeout(()=>setLoading(0),400);
    return true;
  }catch(e){toast('保存エラー: '+e.message,false);setLoading(0);return false;}
}
async function deleteOrderDb(uid){
  setLoading(50);
  try{
    await sbFetch(`/rest/v1/orders?uid=eq.${uid}`,{method:'DELETE'});
    orders=orders.filter(o=>o._uid!==uid);
    toast('削除しました');
    setLoading(100);setTimeout(()=>setLoading(0),400);
  }catch(e){toast('削除エラー: '+e.message,false);setLoading(0);}
}
async function bulkInsert(rows){
  setLoading(20);
  try{
    let updated=0,added=0;
    for(const newRow of rows){
      // 既存データを検索（同じ案件番号・同じ案件名で照合）
      const existing=orders.find(o=>o.id===newRow.id&&o.name===newRow.name);
      if(existing){
        // 既存データのうち手入力部分を保持してExcel側の項目だけ上書き
        const merged={
          ...existing,
          // Excelから上書きする項目
          name:      newRow.name,
          client:    newRow.client,
          assignee:  newRow.assignee,
          qty:       newRow.qty,
          maker:     newRow.maker,
          category1: newRow.category1,
          category2: newRow.category2,
          planner:   newRow.planner,
          production:newRow.production,
          country:   newRow.country,
          supplier:  newRow.supplier,
          shipMethod:newRow.shipMethod,
          fin:       newRow.fin,
          // scheduleのdelivery（納期）だけ更新、他のスケジュールは保持
          schedule:{...existing.schedule, delivery:newRow.schedule.delivery},
          // tasks の orderDate（受注日）だけ更新、他のタスクは保持
          tasks:{...existing.tasks, orderDate:newRow.tasks.orderDate||existing.tasks.orderDate},
          // 保持する項目：status, memo, hidden, images, その他のtasks/schedule
        };
        await saveOrder(merged);
        updated++;
      }else{
        // 新規案件として追加
        await saveOrder(newRow);
        added++;
      }
    }
    await loadOrders();
    toast(`更新:${updated}件 / 新規追加:${added}件`);
    setLoading(100);setTimeout(()=>setLoading(0),400);
  }catch(e){toast('インポートエラー: '+e.message,false);setLoading(0);}
}

  try{
    const res=await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=password',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY},
      body:JSON.stringify({email,password})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.error_description||data.msg||'ログイン失敗');
    _session=data;
    localStorage.setItem('sb_session',JSON.stringify(data));
    return true;
  }catch(e){return e.message;}
}
async function signOut(){
  try{
    await fetch(SUPABASE_URL+'/auth/v1/logout',{
      method:'POST',
      headers:{'Authorization':'Bearer '+_session?.access_token,'apikey':SUPABASE_ANON_KEY}
    });
  }catch(e){}
  _session=null;
  localStorage.removeItem('sb_session');
  appState="login";render();
}
function restoreSession(){
  try{
    const s=localStorage.getItem('sb_session');
    if(!s)return false;
    const parsed=JSON.parse(s);
    // expires_atチェック
    if(parsed.expires_at&&Date.now()/1000>parsed.expires_at){
      localStorage.removeItem('sb_session');return false;
    }
    _session=parsed;return true;
  }catch(e){return false;}
}

// ============ フィルター・ソート ============
function filteredOrders(){
  let list=orders.filter(o=>{
    if(!showHidden&&o.hidden)return false;
    if(filterStatus!=="全て"&&o.status!==filterStatus)return false;
    if(filterClients.size>0&&!filterClients.has(o.client||""))return false;
    if(filterAssignees.size>0&&!filterAssignees.has(o.assignee||""))return false;
    const q=searchText.toLowerCase();
    if(q&&![o.name,o.id,o.client||"",o.assignee||"",o.maker||""].some(v=>v.toLowerCase().includes(q)))return false;
    return true;
  });
  if(sortKey){
    list=[...list].sort((a,b)=>{
      let av,bv;
      if(sortKey==='delivery'){
        av=a.schedule&&a.schedule.delivery?a.schedule.delivery:"9999";
        bv=b.schedule&&b.schedule.delivery?b.schedule.delivery:"9999";
      }else{
        av=(a[sortKey]||"").toLowerCase();
        bv=(b[sortKey]||"").toLowerCase();
      }
      return av<bv?-sortDir:av>bv?sortDir:0;
    });
  }
  return list;
}
function sortIcon(key){
  if(sortKey!==key)return`<span style="opacity:0.3;margin-left:2px">⇅</span>`;
  return sortDir===1?`<span style="margin-left:2px;color:#4A7EC7">↑</span>`:`<span style="margin-left:2px;color:#4A7EC7">↓</span>`;
}
function statusTag(st){
  const col=STATUS_MAP[st]||"#888";
  return`<span class="tag" style="background:${col}22;color:${col};border:1px solid ${col}44">${esc(st)}</span>`;
}
function checkCell(val){
  return val?`<span style="color:#2E8B6E">✓</span> <span style="color:#888;font-size:10px">${fmt(val)}</span>`:`<span style="color:#ccc">—</span>`;
}

// ============ ガントビュー ============
function ganttRange(){
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date(today); start.setDate(start.getDate()-14);
  const end=new Date(start);
  end.setMonth(end.getMonth()+ganttSpan);
  function ds(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
  return{start:ds(start),end:ds(end)};
}
function renderGanttView(){
  const range=ganttRange();const total=diff(range.start,range.end)||1;
  const list=filteredOrders().filter(o=>!o.hidden);
  const startD=pd(range.start),endD=pd(range.end);
  const todayLeft=(()=>{const d=diff(range.start,todayStr());if(d===null)return null;const p=(d/total)*100;return p>=0&&p<=100?p:null;})();
  const monthHeaders=(()=>{
    let out="";
    // 上段：月ラベル（常に表示）
    const tmpCur=new Date(startD.getFullYear(),startD.getMonth(),1);
    while(tmpCur<=endD){
      const ms=new Date(tmpCur.getFullYear(),tmpCur.getMonth(),1);
      const me=new Date(tmpCur.getFullYear(),tmpCur.getMonth()+1,0);
      const vs=Math.max(0,Math.round((ms-startD)/86400000));
      const ve=Math.min(total-1,Math.round((me-startD)/86400000));
      const lp=(vs/total)*100, wp=((ve-vs+1)/total)*100;
      out+=`<div style="position:absolute;top:0;left:${lp}%;width:${wp}%;height:14px;font-size:10px;color:#333;font-weight:700;border-left:2px solid #b0b0b0;padding-left:4px;overflow:hidden;white-space:nowrap;background:rgba(255,255,255,0.95)">${tmpCur.getFullYear()}年${tmpCur.getMonth()+1}月</div>`;
      tmpCur.setMonth(tmpCur.getMonth()+1);
    }
    // 下段：週区切り（1・3ヶ月は週ごと、6ヶ月以上は月ごとのみ）
    if(ganttSpan<=3){
      // 週ごとの区切りと日付ラベル
      let d=new Date(startD);
      // 最初の月曜を探す
      while(d.getDay()!==1) d.setDate(d.getDate()+1);
      while(d<=endD){
        const ds=d.toISOString().slice(0,10);
        const lp=(diff(range.start,ds)/total)*100;
        if(lp>0&&lp<100){
          const isMonthStart=d.getDate()<=7;
          const borderColor=isMonthStart?'#b0b0b0':'#d8d8d8';
          const borderW=isMonthStart?'2px':'1px';
          out+=`<div style="position:absolute;top:14px;left:${lp}%;height:calc(100% - 14px);border-left:${borderW} solid ${borderColor};pointer-events:none">
            <span style="position:absolute;top:0;left:2px;font-size:9px;color:#888;white-space:nowrap;font-weight:${isMonthStart?700:400}">${d.getMonth()+1}/${d.getDate()}</span>
          </div>`;
        }
        d.setDate(d.getDate()+7);
      }
    } else if(ganttSpan<=6){
      // 月ごとの区切りのみ（週は省略）
      let d=new Date(startD.getFullYear(),startD.getMonth()+1,1);
      while(d<=endD){
        const ds=d.toISOString().slice(0,10);
        const lp=(diff(range.start,ds)/total)*100;
        if(lp>0&&lp<100){
          out+=`<div style="position:absolute;top:14px;left:${lp}%;height:calc(100% - 14px);border-left:2px solid #d0cfc8;pointer-events:none"></div>`;
        }
        d.setMonth(d.getMonth()+1);
      }
    }
    return out;
  })();
  const rows=list.map(o=>{
    const bars=GANTT_PHASES.map(ph=>{
      const s=pd(o.schedule[ph.s]),e=pd(o.schedule[ph.e]);if(!s)return"";
      const lDay=Math.max(0,Math.round((s-startD)/86400000)),end=e||s;
      const wDay=Math.max(1,Math.round((end-s)/86400000)+1);
      const lp=(lDay/total)*100,fw=Math.min((wDay/total)*100,100-(lDay/total)*100);
      if(lp>100)return"";
      return`<div class="gantt-bar" style="left:${lp}%;width:${fw}%;background:${ph.col};opacity:0.85">${fw>5?ph.label:""}</div>`;
    }).join("");
    // スケジュール未入力の場合：受注日〜納期を納期色で全体表示
    const fallbackBar=(()=>{
      const hasAnyPhase=GANTT_PHASES.some(ph=>o.schedule[ph.s]);
      if(hasAnyPhase)return"";
      const delivery=pd(o.schedule.delivery);
      const orderApplied=pd(o.tasks.orderApplied);
      if(!delivery)return"";
      const sDate=orderApplied||delivery;
      const lDay=Math.max(0,Math.round((sDate-startD)/86400000));
      const wDay=Math.max(1,Math.round((delivery-sDate)/86400000)+1);
      const lp=(lDay/total)*100,fw=Math.min((wDay/total)*100,100-(lDay/total)*100);
      if(lp>100)return"";
      return`<div class="gantt-bar" style="left:${lp}%;width:${fw}%;background:#D9534F;opacity:0.35;border:1px dashed #D9534F">${fw>8?'作業期間':''}</div>`;
    })();
    const dm=(()=>{const d=o.schedule.delivery;if(!d)return"";const lp=(diff(range.start,d)/total)*100;if(lp<0||lp>100)return"";return`<div style="position:absolute;top:2px;left:${lp}%;width:2px;height:30px;background:#D9534F;border-radius:1px;transform:translateX(-50%)"></div>`;})();
    const tl=todayLeft!==null?`<div style="position:absolute;top:0;left:${todayLeft}%;width:1px;height:100%;background:#BA7517;opacity:0.5;pointer-events:none"></div>`:"";
    return`<div style="display:grid;grid-template-columns:64px 160px 52px 68px 1fr;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #eeede6">
      <div style="font-size:9px;color:#4A7EC7;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(o.id)}</div>
      <div style="overflow:hidden">
        <button onclick="openEdit('${o._uid}')" style="background:none;border:none;cursor:pointer;color:#4A7EC7;font-size:11px;font-weight:600;text-align:left;padding:0;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block">${esc(o.name)}</button>
        <span style="font-size:9px;color:#bbb">${esc(o.client||"")}${o.assignee?` · ${esc(o.assignee)}`:""}</span>
      </div>
      <div style="font-size:10px;color:#555;text-align:right">${o.qty?Number(o.qty).toLocaleString():""}</div>
      <div style="font-size:10px;color:#C05050;font-weight:600;white-space:nowrap">${o.schedule&&o.schedule.delivery?fmt(o.schedule.delivery):"—"}</div>
      <div style="position:relative;height:34px">${tl}${fallbackBar}${bars}${dm}</div>
    </div>`;
  }).join("");
  const legend=GANTT_PHASES.map(p=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#666"><span style="width:10px;height:8px;border-radius:2px;background:${p.col};display:inline-block"></span>${p.label}</span>`).join("");
  const spanBtns=[1,3,6,12].map(m=>`<button onclick="setGanttSpan(${m})" style="padding:3px 10px;font-size:11px;border:1px solid ${ganttSpan===m?'#4A7EC7':'#d0cfc8'};background:${ganttSpan===m?'#4A7EC7':'#fff'};color:${ganttSpan===m?'#fff':'#555'};border-radius:5px;cursor:pointer">${m===12?'1年':m+'ヶ月'}</button>`).join("");
  return`<div style="background:#fff;border:1px solid #e8e7e0;border-radius:8px;padding:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px">
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">${legend}
        <span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#666"><span style="width:10px;height:8px;border-radius:2px;background:#D9534F;opacity:0.35;border:1px dashed #D9534F;display:inline-block"></span>作業期間（未確定）</span>
        <span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#666"><span style="width:2px;height:12px;background:#D9534F;display:inline-block;border-radius:1px"></span>納期</span>
        <span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#666"><span style="width:2px;height:12px;background:#BA7517;display:inline-block;border-radius:1px"></span>今日</span>
      </div>
      <div style="display:flex;gap:4px">${spanBtns}</div>
    </div>
    <div style="overflow-x:auto;overflow-y:visible">
      <div style="min-width:700px;position:relative">
        <div style="display:grid;grid-template-columns:64px 160px 52px 68px 1fr;gap:6px;padding-bottom:4px;border-bottom:2px solid #e8e7e0;background:#fff;position:sticky;top:0;z-index:10;padding-top:4px">
          <div style="font-size:10px;color:#999">案件番号</div>
          <div style="font-size:10px;color:#999">案件名</div>
          <div style="font-size:10px;color:#999;text-align:right">数量</div>
          <div style="font-size:10px;color:#C05050;font-weight:600">納期</div>
          <div style="position:relative;height:42px">${monthHeaders}</div>
        </div>
        ${rows||`<div style="text-align:center;padding:32px;color:#999">案件がありません</div>`}
      </div>
    </div>
  </div>`;
}

// ============ モーダルタブ ============
function renderTabInfo(o){
  const statusOpts=STATUS_LIST.map(s=>`<option value="${s}"${o.status===s?" selected":""}>${s}</option>`).join("");

// ============ サマリー ============
function renderSummary(){
  const now=new Date();
  const thisMonth=orders.filter(o=>{const d=pd(o.schedule.delivery);return d&&d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();}).length;
  // 完了数は案件番号単位でカウント
  const completedIds=new Set(orders.filter(o=>o.status==='完了').map(o=>o.id).filter(Boolean));
  const completedCount=completedIds.size;
  const cards=[
    {label:"総案件数",val:orders.length,col:"#4A7EC7",click:null},
    {label:"進行中",val:orders.filter(o=>!o.hidden&&o.status!=="完了").length,col:"#2E8B6E",click:null},
    {label:"今月納期",val:thisMonth,col:"#BA7517",click:null},
    {label:"非表示",val:orders.filter(o=>o.hidden).length,col:"#aaa",click:null},
    {label:"完了",val:completedCount,col:"#555",click:"toggleCompleted()"},
  ];
  // 完了一覧
  const completedList=showCompleted?renderCompletedList():"";
  return`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:${showCompleted?'8px':'14px'}">
    ${cards.map(c=>`<div class="card" style="min-width:78px;border-left:3px solid ${c.col};${c.click?'cursor:pointer;':''}${c.click&&showCompleted?'background:#f0faf5;':''}" ${c.click?`onclick="${c.click}"`:''}}>
      <div style="font-size:22px;font-weight:700;color:${c.col}">${c.val}</div>
      <div style="font-size:10px;color:#888;margin-top:2px">${c.label}${c.click?` ${showCompleted?'▲':'▼'}`:''}</div>
    </div>`).join("")}
  </div>${completedList}`;
}

function renderCompletedList(){
  const completedOrders=orders.filter(o=>o.status==='完了');
  if(!completedOrders.length)return`<div style="padding:12px;background:#f8f7f0;border-radius:8px;margin-bottom:14px;font-size:12px;color:#999">完了案件はありません</div>`;
  // 案件番号でグループ化
  const groups={};
  completedOrders.forEach(o=>{
    const key=o.id||'(番号なし)';
    if(!groups[key])groups[key]=[];
    groups[key].push(o);
  });
  const rows=Object.entries(groups).map(([id,list])=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid #f0efe8">
      <div>
        <span style="font-size:10px;color:#4A7EC7;font-family:monospace;font-weight:700">${esc(id)}</span>
        <span style="font-size:11px;color:#555;margin-left:8px">${esc(list[0].name)}</span>
        ${list.length>1?`<span style="font-size:10px;color:#aaa;margin-left:4px">他${list.length-1}件</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;color:#C05050">${list[0].schedule&&list[0].schedule.delivery?fmtFull(list[0].schedule.delivery):''}</span>
        <button class="btn" style="padding:2px 8px;font-size:10px" onclick="restoreOrder('${esc(list[0]._uid)}')">復元</button>
      </div>
    </div>`).join('');
  return`<div style="background:#fff;border:1px solid #e8e7e0;border-radius:8px;margin-bottom:14px;overflow:hidden">
    <div style="padding:8px 12px;background:#f5f5f0;border-bottom:1px solid #e8e7e0;font-size:11px;font-weight:600;color:#555">完了案件一覧（納期順）</div>
    ${rows}
  </div>`;
}

  const statusOpts=["全て",...STATUS_LIST].map(s=>`<option value="${s}"${filterStatus===s?" selected":""}>${s}</option>`).join("");
  const userEmail=_session?.user?.email||"";
  document.getElementById("app").innerHTML=`
    ${renderModal()}${renderBulkImportModal()}${renderSingleImportModal()}
    <div class="topbar">
      <div style="font-size:15px;font-weight:700">📦 受注案件管理</div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <input placeholder="案件名・顧客・担当で検索" value="${esc(searchText)}" oninput="setSearch(this.value)" style="width:150px">
        <select onchange="setFilter(this.value)" style="width:88px">${statusOpts}</select>
        <div style="display:flex;border:1px solid #d0cfc8;border-radius:6px;overflow:hidden">
          <button onclick="setView('table')" style="padding:5px 10px;font-size:11px;border:none;background:${viewMode==='table'?'#4A7EC7':'#fff'};color:${viewMode==='table'?'#fff':'#555'};cursor:pointer">一覧</button>
          <button onclick="setView('gantt')" style="padding:5px 10px;font-size:11px;border:none;border-left:1px solid #d0cfc8;background:${viewMode==='gantt'?'#4A7EC7':'#fff'};color:${viewMode==='gantt'?'#fff':'#555'};cursor:pointer">ガント</button>
        </div>
        <button class="btn btn-green" onclick="openImportModal('bulk')" style="font-size:12px">📥 一括インポート</button>
        <button class="btn btn-primary" onclick="openNew()" style="font-size:12px">＋ 新規案件</button>
        <button class="btn" onclick="doSignOut()" style="font-size:11px;color:#888" title="${esc(userEmail)}">ログアウト</button>
      </div>
    </div>
    <div class="main-content" style="padding:16px 20px">
      ${renderSummary()}
      ${viewMode==="table"?renderTableView():renderGanttView()}
    </div>`;
}

// ============ Excelパース ============
function parseXlsx(buffer){
  const wb=XLSX.read(buffer,{type:'array',cellDates:true});
  const sheet=wb.Sheets['2026'];
  if(!sheet)throw new Error("「2026」シートが見つかりません");
  const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true});
  const today=new Date();today.setHours(0,0,0,0);
  const result=[];
  function excelSerialToDate(n){return new Date(new Date(1899,11,30).getTime()+n*86400000);}
  function toDate(v){
    if(!v&&v!==0)return null;
    if(v instanceof Date)return isNaN(v)?null:v;
    if(typeof v==='number'&&v>10000)return excelSerialToDate(v);
    if(typeof v==='string'){const d=new Date(v);return isNaN(d)?null:d;}
    return null;
  }
  function toDs(d){if(!d)return'';return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
  const ss=v=>v!=null&&v!==''?String(v).trim():'';
  const sn=v=>{const n=parseFloat(String(v).replace(/,/g,''));return isNaN(n)?0:n;};
  for(let i=2;i<rows.length;i++){
    const r=rows[i];if(!r||!r[1])continue;
    const dd=toDate(r[11]);if(!dd)continue;
    if(dd.getFullYear()!==2026)continue;
    const fiscalStart=new Date(2026,4,1); // 5月1日
    if(dd<fiscalStart)continue;
    const t={},s={};
    TASK_FIELDS.forEach(f=>t[f.key]="");
    SCHED_FIELDS.forEach(f=>s[f.key]="");
    s.delivery=toDs(dd);
    const fin={};FIN_FIELDS.forEach(ff=>fin[ff.key]=sn(r[ff.col]));
    // 受注日（A列=列0）
    const orderDateD=toDate(r[0]);
    if(orderDateD)t.orderDate=toDs(orderDateD);
    result.push({_uid:null,id:ss(r[1]),name:ss(r[4]),client:ss(r[2]),assignee:ss(r[7]),qty:sn(r[16]),
      status:"受注前",hidden:false,memo:"",
      maker:ss(r[3]),category1:ss(r[5]),category2:ss(r[6]),planner:ss(r[8]),production:ss(r[9]),
      country:ss(r[13]),supplier:ss(r[14]),shipMethod:ss(r[15]),
      fin,images:[],tasks:t,schedule:s});
  }
  return result;
}

function handleFileSelect(input,mode){const f=input.files[0];if(f)readFile(f,mode);}
function handleDrop(e,mode){
  e.preventDefault();
  const zid=mode==='bulk'?'drop-zone-bulk':'drop-zone-single';
  document.getElementById(zid)?.classList.remove('dragover');
  const f=e.dataTransfer.files[0];if(f)readFile(f,mode);
}
function readFile(file,mode){
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const parsed=parseXlsx(new Uint8Array(ev.target.result));
      if(mode==='bulk'){importPreview=parsed;importMessage=parsed.length?`✓ ${parsed.length}件が読み込み可能です`:"対象データが見つかりませんでした";}
      else{singleImportRows=parsed;importSelected=new Set();importMessage=parsed.length?`✓ ${parsed.length}件を読み込みました`:"対象データが見つかりませんでした";}
      render();
    }catch(err){importMessage="エラー: "+err.message;render();}
  };
  reader.readAsArrayBuffer(file);
}
async function doBulkImport(){
  if(!importPreview)return;
  importModal=null;render();
  await bulkInsert(importPreview);
  importPreview=null;render();
}
async function doSingleImport(){
  if(!singleImportRows||importSelected.size===0)return;
  const toAdd=singleImportRows.filter(r=>importSelected.has(r.id));
  importModal=null;singleImportRows=null;importSelected=new Set();render();
  for(const o of toAdd)await saveOrder(o);
  await loadOrders();render();
}

window.setView=v=>{viewMode=v;render();};
window.toggleCompleted=()=>{showCompleted=!showCompleted;render();};
window.restoreOrder=async(uid)=>{
  const o=orders.find(x=>x._uid==uid);if(!o)return;
  o.status='進行中';o.hidden=false;
  await saveOrder(o);
  await loadOrders();render();
};
window.quickChangeStatus=async(uid,status)=>{
  const o=orders.find(x=>x._uid==uid);if(!o)return;
  o.status=status;render();
  await saveOrder(o);
};
window.setGanttSpan=m=>{ganttSpan=m;render();};
window.setFilter=v=>{filterStatus=v;render();};
window.setSearch=v=>{searchText=v;render();};
window.toggleSort=key=>{if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=1;}render();};
window.toggleDropdown=(key,e)=>{e.stopPropagation();openDropdown=openDropdown===key?null:key;render();};
window.toggleFilterItem=(key,val,checked)=>{const s=key==="client"?filterClients:filterAssignees;checked?s.add(val):s.delete(val);render();};
window.toggleFilterAll=(key,checked)=>{if(checked){if(key==="client")filterClients.clear();else filterAssignees.clear();}render();};
window.clearFilter=key=>{if(key==="client")filterClients.clear();else filterAssignees.clear();openDropdown=null;render();};
window.toggleHidden=async uid=>{
  const o=orders.find(x=>x._uid==uid);if(!o)return;
  o.hidden=!o.hidden;render();
  await saveOrder(o);
};
window.toggleShowHidden=()=>{showHidden=!showHidden;render();};
window.openEdit=uid=>{
  const o=orders.find(x=>x._uid==uid);if(!o)return;
  editDraft=JSON.parse(JSON.stringify(o));editingUid=uid;isNew=false;modalTab="info";render();
};
window.openNew=()=>{editDraft=emptyOrder();editingUid=null;isNew=true;modalTab="info";importModal="single";singleImportRows=null;importSelected=new Set();importMessage="";render();};
window.closeModalBtn=()=>{editDraft=null;editingUid=null;render();};
window.closeModalOverlay=e=>{if(e.target.id==="modal-overlay"){editDraft=null;editingUid=null;render();}};
window.switchModalTab=tab=>{modalTab=tab;render();};
window.setDraftField=(path,val)=>{
  if(!editDraft)return;
  const keys=path.split(".");let obj=editDraft;
  for(let i=0;i<keys.length-1;i++)obj=obj[keys[i]];
  obj[keys[keys.length-1]]=val;
};
window.setDraftFin=(key,val)=>{if(!editDraft)return;if(!editDraft.fin)editDraft.fin={};editDraft.fin[key]=parseFloat(val)||0;};
window.doSaveModal=async()=>{
  if(!editDraft)return;
  const ok=await saveOrder(editDraft);
  if(ok){editDraft=null;editingUid=null;isNew=false;await loadOrders();render();}
};
window.deleteOrder=async uid=>{
  if(!confirm("この案件を削除しますか？"))return;
  await deleteOrderDb(uid);render();
};
window.switchSibling=uid=>{
  const o=orders.find(x=>x._uid==uid);if(!o)return;
  editDraft=JSON.parse(JSON.stringify(o));editingUid=uid;isNew=false;modalTab="info";render();
};
window.openImportModal=mode=>{importModal=mode;importPreview=null;importMessage="";if(mode==='single'){singleImportRows=null;importSelected=new Set();}render();};
window.closeImportModal=()=>{importModal=null;importPreview=null;importMessage="";singleImportRows=null;importSelected=new Set();render();};
window.handleFileSelect=handleFileSelect;
window.handleDrop=handleDrop;
window.doBulkImport=doBulkImport;
window.doSingleImport=doSingleImport;
window.toggleSingleSelect=(id,checked)=>{checked?importSelected.add(id):importSelected.delete(id);render();};
window.selectAllSingle=checked=>{
  if(checked&&singleImportRows)singleImportRows.forEach(r=>importSelected.add(r.id));
  else importSelected.clear();render();
};
window.addImages=function(input){
  const files=[...input.files];let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      if(!editDraft.images)editDraft.images=[];
      editDraft.images.push(ev.target.result);
      loaded++;if(loaded===files.length)render();
    };reader.readAsDataURL(file);
  });
};
window.removeImage=function(idx){if(!editDraft)return;editDraft.images.splice(idx,1);render();};
window.openLightbox=function(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').style.display='flex';};
window.closeLightbox=function(){document.getElementById('lightbox').style.display='none';};
window.doSignOut=async function(){await signOut();};
document.addEventListener('click',e=>{
  if(openDropdown&&!e.target.closest('.dd-panel')&&!e.target.closest('[onclick*="toggleDropdown"]')){openDropdown=null;render();}
});

// ============ 起動 ============
async function init(){
  // SheetJS読み込み
  await new Promise(resolve=>{
    const sc=document.createElement('script');
    sc.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    sc.onload=resolve;sc.onerror=resolve;
    document.head.appendChild(sc);
  });
  // セッション復元
  if(restoreSession()){
    appState="app";
    render(); // まずUIを出す
    await loadOrders();
    render();
  }else{
    appState="login";
    render();
  }
}
init();
</script>
